name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -W clippy::all

  gpu-smoke:
    name: GPU Smoke (MI300X)
    runs-on: [self-hosted, mi300x]
    needs: [build-and-test, fmt, clippy]
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build workspace
        run: cargo build --workspace --all-targets

      - name: Host detection
        run: ./target/debug/rocm doctor

      - name: Engine detection
        run: ./target/debug/rocm-engine-pytorch detect

      - name: Engine capabilities
        run: ./target/debug/rocm-engine-pytorch capabilities

      - name: Resolve large-model recipe
        run: ./target/debug/rocm-engine-pytorch resolve-model qwen32b
