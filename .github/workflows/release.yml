name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build release binaries
        run: |
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -e HOME=/tmp/rocm-cli-home \
            -v "$PWD":/work \
            -w /work \
            quay.io/pypa/manylinux2014_x86_64 \
            /bin/bash -lc '
              set -euo pipefail
              mkdir -p "$HOME"
              curl -fsSL https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
              export PATH="$HOME/.cargo/bin:$PATH"
              cargo build --release --workspace
            '

      - name: Package release bundle
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          DIST="rocm-cli-${VERSION}-linux-amd64"

          chmod +x install.sh scripts/package-linux-release.sh
          ./scripts/package-linux-release.sh "${DIST}"

          cp "dist/${DIST}.tar.gz" dist/rocm-cli-linux-amd64.tar.gz
          cp "dist/${DIST}.tar.gz.sha256" dist/rocm-cli-linux-amd64.tar.gz.sha256

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          gh release create "${VERSION}" \
            --title "rocm-cli ${VERSION}" \
            --notes "$(cat <<EOF
          Install the latest stable release on Linux x86_64:

          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh
          \`\`\`

          Install a specific tagged release:

          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh -s -- ${VERSION}
          \`\`\`
          EOF
          )" \
            dist/*.tar.gz dist/*.tar.gz.sha256
